name: Question
description: Ask a ZeticMLange Flutter SDK integration question.
title: "[Question]: "
labels:
  - question
body:
  - type: textarea
    id: question
    attributes:
      label: Question
      description: Describe what you are trying to build and where you are blocked.
    validations:
      required: true
  - type: input
    id: package-version
    attributes:
      label: Package version
      placeholder: "1.0.0"
    validations:
      required: false
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Android
        - iOS
        - Both Android and iOS
        - Not platform-specific
    validations:
      required: false
