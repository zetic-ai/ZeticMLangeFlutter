name: Documentation issue
description: Report missing, unclear, or incorrect documentation.
title: "[Docs]: "
labels:
  - documentation
body:
  - type: input
    id: page
    attributes:
      label: Page or section
      placeholder: "https://docs.zetic.ai/platform-integration/flutter/setup"
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What should be improved?
      description: Describe what is missing, outdated, confusing, or incorrect.
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested change
    validations:
      required: false
